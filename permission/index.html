<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kobo Bulk Permissions</title>

<style>
body {
    font-family: system-ui, Arial;
    background: #f5f7fb;
    margin: 0;
    color: #111827;
}

.container {
    max-width: 850px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    font-size: 22px;
    margin-bottom: 20px;
}

.card {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 15px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}

label {
    font-size: 13px;
    color: #374151;
    display: block;
    margin-top: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 14px;
}

input:focus, select:focus {
    outline: none;
    border-color: #3b82f6;
}

.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.dropzone {
    border: 2px dashed #cbd5e1;
    padding: 18px;
    text-align: center;
    border-radius: 10px;
    margin-top: 10px;
    cursor: pointer;
    background: #fafafa;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #1d4ed8;
}

.log {
    font-size: 12px;
    white-space: pre-wrap;
    max-height: 220px;
    overflow: auto;
    background: #0b1020;
    color: #d1d5db;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 Kobo Bulk Permissions Manager</h1>

<div class="card">

<label>Cloudflare Worker URL</label>
<input id="worker" placeholder="https://your-worker.workers.dev">

<div class="row">
<div>
<label>Server</label>
<select id="server">
    <option value="https://eu.kobotoolbox.org">EU Server</option>
    <option value="https://kf.kobotoolbox.org">Global Server</option>
</select>
</div>

<div>
<label>Permission Type</label>
<select id="permission">
    <option value="add_submissions">Add submissions</option>
    <option value="view_submissions">View submissions</option>
    <option value="change_asset">Edit form</option>
    <option value="validate_submissions">Validate submissions</option>
    <option value="manage_asset">Manage project</option>
</select>
</div>
</div>

<label>API Token</label>
<input id="token" type="password" placeholder="Kobo API Token">

<label>Asset UID</label>
<input id="asset">

<div class="dropzone" onclick="file.click()">
Drop CSV or click here
<input type="file" id="file" accept=".csv" hidden>
</div>

<button onclick="run()">Run Bulk Assignment</button>

</div>

<div class="card">
<pre class="log" id="log"></pre>
</div>

</div>

<script>

const log = (m) =>
  document.getElementById("log").textContent += m + "\n";

const file = document.getElementById("file");

function parseCSV(text){
    const lines = text.trim().split("\n");
    const headers = lines[0].split(",");
    const idx = headers.findIndex(h => h.trim().toLowerCase() === "username");

    if(idx === -1) throw new Error("CSV must contain 'username' column");

    return lines.slice(1)
        .map(l => l.split(",")[idx]?.trim())
        .filter(Boolean);
}

async function run(){

    document.getElementById("log").textContent = "";

    const worker = document.getElementById("worker").value;
    const server = document.getElementById("server").value;
    const token = document.getElementById("token").value;
    const asset = document.getElementById("asset").value;
    const permission = document.getElementById("permission").value;
    const fileObj = file.files[0];

    if(!worker || !token || !asset || !fileObj){
        return log("Missing required fields.");
    }

    const users = parseCSV(await fileObj.text());
    log("Users found: " + users.length);

    const assignments = users.map(u => ({
        user: `${server}/api/v2/users/${u}/`,
        permission: `${server}/api/v2/permissions/${permission}/`
    }));

    log("Sending request...");

    const res = await fetch(worker, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            server,
            token,
            assetUid: asset,
            assignments
        })
    });

    const data = await res.json();

    if(data.ok){
        log("SUCCESS (" + data.status + ")");
    } else {
        log("FAILED (" + data.status + ")");
    }

    log(JSON.stringify(data.response || data.error, null, 2));
}

</script>

</body>
</html>
